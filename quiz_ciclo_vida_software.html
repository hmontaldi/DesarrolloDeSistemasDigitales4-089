<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>
<title>Quiz de Repaso - Ciclo de Vida del Software</title>
<style>
  :root{
    --azul:#2c3e91;
    --verde:#6aab3c;
    --naranja:#e0692f;
    --violeta:#7b4fa0;
    --rojo:#c0392b;
    --fondo:#fbfaf7;
    --borde:#e4e1da;
  }
  *{box-sizing:border-box;}
  body{
    font-family:'Segoe UI', Arial, sans-serif;
    background:var(--fondo);
    color:#2b2b2b;
    margin:0;
    padding:30px 20px;
  }
  .wrap{max-width:720px;margin:0 auto;}
  .header{
    text-align:center;
    border-bottom:3px solid var(--azul);
    padding-bottom:14px;
    margin-bottom:22px;
  }
  .header h1{margin:0 0 4px 0;color:var(--azul);font-size:24px;}
  .header p{margin:0;color:#666;font-size:13px;}
  .intro{
    background:#eef1fb;
    border-left:5px solid var(--azul);
    padding:12px 16px;
    border-radius:6px;
    margin-bottom:22px;
    font-size:13.5px;
  }
  .pregunta{
    background:#fff;
    border:1px solid var(--borde);
    border-left:6px solid var(--violeta);
    border-radius:8px;
    padding:16px 18px;
    margin-bottom:16px;
  }
  .pregunta h3{
    margin:0 0 10px 0;
    font-size:15px;
    color:#2b2b2b;
  }
  .op{
    display:block;
    background:#f7f6f2;
    border:1px solid var(--borde);
    border-radius:6px;
    padding:9px 12px;
    margin-bottom:7px;
    cursor:pointer;
    font-size:13.5px;
    transition:background .15s;
  }
  .op:hover{background:#efeee8;}
  .op input{margin-right:8px;}
  .op.correcta{background:#e5f4de;border-color:var(--verde);}
  .op.incorrecta{background:#fbe3e0;border-color:var(--rojo);}
  .feedback{
    margin-top:8px;
    font-size:13px;
    font-weight:600;
    display:none;
  }
  .feedback.ok{color:var(--verde);}
  .feedback.mal{color:var(--rojo);}
  .btn-row{
    text-align:center;
    margin:26px 0;
  }
  button{
    background:var(--azul);
    color:#fff;
    border:none;
    padding:12px 26px;
    border-radius:24px;
    font-size:14.5px;
    cursor:pointer;
    font-weight:600;
  }
  button:hover{background:#22317a;}
  button.reset{background:#999;margin-left:10px;}
  button.reset:hover{background:#777;}
  #resultado{
    display:none;
    text-align:center;
    background:#fff;
    border:2px solid var(--azul);
    border-radius:10px;
    padding:22px;
    margin-top:20px;
    font-size:16px;
  }
  #resultado .score{
    font-size:32px;
    font-weight:800;
    color:var(--azul);
    margin:6px 0;
  }
  #resultado .mensaje{font-size:14px;color:#555;}
  .locked .op{cursor:default;pointer-events:none;}
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <h1>🧠 Quiz de Repaso</h1>
    <p>Ciclo de Vida del Software · Antes del TP N°3 · Prof. Humberto Montaldi</p>
  </div>

  <div class="intro">
    Respondé las 10 preguntas. Al elegir una opción vas a ver de inmediato si es correcta. Al final vas a ver tu
    puntaje total. Podés repetirlo las veces que quieras antes de empezar el TP.
  </div>

  <form id="quiz"></form>

  <div class="btn-row">
    <button type="button" id="corregirBtn" onclick="corregirTodo()">Corregir quiz</button>
    <button type="button" class="reset" onclick="location.reload()">Volver a intentar</button>
  </div>

  <div id="resultado">
    <div>Resultado</div>
    <div class="score" id="scoreText"></div>
    <div class="mensaje" id="scoreMsg"></div>
  </div>

</div>

<script>
const preguntas = [
  {
    q: "¿Cuántas etapas tiene el ciclo de vida del software según la guía?",
    ops: ["5", "6", "7", "9"],
    correcta: 2
  },
  {
    q: "¿En qué etapa se identifica con detalle qué necesita el usuario?",
    ops: ["Planificación", "Análisis de Requisitos", "Diseño y Prototipo", "Pruebas"],
    correcta: 1
  },
  {
    q: "¿Qué porcentaje de los defectos del software se genera en la etapa de Requisitos si no se hace bien?",
    ops: ["5% a 10%", "15% a 20%", "40% a 50%", "80% a 90%"],
    correcta: 2
  },
  {
    q: "¿Para qué sirve un prototipo?",
    ops: [
      "Para instalar el sistema en producción",
      "Para mostrar la idea al usuario antes de programar y evitar correcciones costosas",
      "Para corregir errores luego del lanzamiento",
      "Para capacitar al personal"
    ],
    correcta: 1
  },
  {
    q: "¿Por qué la etapa de Desarrollo suele generar menos defectos de lo esperado?",
    ops: [
      "Porque los programadores nunca se equivocan",
      "Porque no requiere planificación previa",
      "Porque cuando las etapas anteriores se hicieron bien, hay menos errores que arrastrar",
      "Porque no se prueba el sistema"
    ],
    correcta: 2
  },
  {
    q: "¿Qué etapa suele 'pagar las consecuencias' cuando las etapas anteriores se atrasan?",
    ops: ["Planificación", "Pruebas", "Desarrollo", "Mantenimiento"],
    correcta: 1
  },
  {
    q: "¿Qué es un requisito NO funcional?",
    ops: [
      "Algo que el sistema debe hacer, como 'buscar un libro por título'",
      "Un error del sistema",
      "Una característica de cómo debe funcionar, como 'responder en menos de 2 segundos'",
      "Un prototipo no funcional"
    ],
    correcta: 2
  },
  {
    q: "¿Qué ocurre en la etapa de Despliegue?",
    ops: [
      "Se define el alcance del proyecto",
      "Se instala el sistema, se capacita al personal y se monitorea el funcionamiento inicial",
      "Se escriben los requisitos",
      "Se diseñan las pantallas"
    ],
    correcta: 1
  },
  {
    q: "Entre Requisitos, Diseño y Pruebas, ¿qué porcentaje del total de errores pueden provocar juntas si se hacen mal?",
    ops: ["10% a 20%", "30% a 40%", "65% a 85%", "100%"],
    correcta: 2
  },
  {
    q: "¿Qué es el 'meta proceso' del desarrollo de software?",
    ops: [
      "Un tipo de bug",
      "El ciclo de vida, que organiza y coordina todos los demás procesos del proyecto",
      "La etapa de pruebas",
      "El lenguaje de programación usado"
    ],
    correcta: 1
  }
];

const form = document.getElementById('quiz');
preguntas.forEach((p, i) => {
  const div = document.createElement('div');
  div.className = 'pregunta';
  div.id = 'preg' + i;
  let opsHtml = '';
  p.ops.forEach((op, j) => {
    opsHtml += `<label class="op" id="preg${i}-op${j}">
      <input type="radio" name="preg${i}" value="${j}" onclick="responder(${i}, ${j})">${op}
    </label>`;
  });
  div.innerHTML = `<h3>${i+1}. ${p.q}</h3>${opsHtml}<div class="feedback" id="preg${i}-fb"></div>`;
  form.appendChild(div);
});

const respuestas = {};

function responder(i, j) {
  respuestas[i] = j;
  const pregDiv = document.getElementById('preg' + i);
  pregDiv.classList.add('locked');
  const correcta = preguntas[i].correcta;
  for (let k = 0; k < preguntas[i].ops.length; k++) {
    const op = document.getElementById(`preg${i}-op${k}`);
    op.classList.remove('correcta', 'incorrecta');
    if (k === correcta) op.classList.add('correcta');
    else if (k === j) op.classList.add('incorrecta');
  }
  const fb = document.getElementById('preg' + i + '-fb');
  fb.style.display = 'block';
  if (j === correcta) {
    fb.textContent = '✅ ¡Correcto!';
    fb.className = 'feedback ok';
  } else {
    fb.textContent = '❌ Incorrecto. La respuesta correcta está marcada en verde.';
    fb.className = 'feedback mal';
  }
}

function corregirTodo() {
  let correctas = 0;
  let sinResponder = 0;
  preguntas.forEach((p, i) => {
    if (respuestas[i] === undefined) {
      sinResponder++;
    } else if (respuestas[i] === p.correcta) {
      correctas++;
    }
  });
  const total = preguntas.length;
  const resultado = document.getElementById('resultado');
  resultado.style.display = 'block';
  document.getElementById('scoreText').textContent = correctas + ' / ' + total;
  let msg = '';
  if (sinResponder > 0) {
    msg = `Te faltan ${sinResponder} pregunta(s) por responder. `;
  }
  if (correctas === total) {
    msg += '¡Excelente! Estás listo/a para empezar el TP N°3.';
  } else if (correctas >= total * 0.7) {
    msg += 'Muy bien. Repasá las que fallaste antes de empezar el TP.';
  } else {
    msg += 'Te conviene repasar la teoría antes de empezar el TP.';
  }
  document.getElementById('scoreMsg').textContent = msg;
  resultado.scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
